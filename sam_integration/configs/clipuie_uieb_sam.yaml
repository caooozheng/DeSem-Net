experiment:
  name: clipuie_uieb_sam
  seed: 42
  output_dir: artifacts

dataset:
  train_root: UnderwaterDatasets/UIEB/train
  val_root: UnderwaterDatasets/UIEB/val
  test_root: UnderwaterDatasets/UIEB/test
  image_size: 256
  batch_size: 2
  num_workers: 4
  pin_memory: true
  mask_dir_name: mask_sam
  mask_suffix: .npy
  mask_fallback_value: 1.0

model:
  name: clipuie_net
  num_branch: 3
  n_feat: 32
  n_rcb: 2
  chan_factor: 2
  bias: true
  use_sam_mask: true

optimizer:
  name: adamw
  generator_lr: 0.0001
  router_lr: 0.00002
  weight_decay: 0.0001
  betas: [0.9, 0.999]

scheduler:
  generator_milestones: [25, 50, 75, 100]
  generator_gamma: 0.5
  router_milestones: [25, 50, 75, 100]
  router_gamma: 0.3

training:
  epochs: 200
  route_start_epoch: 0
  checkpoint_interval: 20
  validate_on: val
  pretrained_checkpoint: null
  strict_load: false
  lambda_style: 10.0
  lambda_route: 1.0
  lambda_foreground: 0.5
  lambda_background: 0.25

evaluation:
  checkpoint: artifacts/clipuie_uieb_sam/checkpoints/best.pth
  save_images: false
  compute_uiqm: true
  compute_uciqe: true
  compute_branch_metrics: false

runtime:
  device: cuda
  cudnn_benchmark: true
