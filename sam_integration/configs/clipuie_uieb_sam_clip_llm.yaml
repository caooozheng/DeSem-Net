experiment:
  name: clipuie_uieb_sam_clip_llm
  seed: 42
  output_dir: artifacts

dataset:
  train_root: UnderwaterDatasets/UIEB/train
  val_root: UnderwaterDatasets/UIEB/val
  test_root: UnderwaterDatasets/UIEB/test
  image_size: 256
  batch_size: 2
  num_workers: 4
  pin_memory: true
  mask_dir_name: mask_sam
  mask_suffix: .npy
  mask_fallback_value: 1.0

model:
  name: clipuie_net
  num_branch: 3
  n_feat: 32
  n_rcb: 2
  chan_factor: 2
  bias: true
  use_sam_mask: true

multimodal:
  enabled: true
  clip_model_name: configs/models/clip-vit-base-patch32
  llm_model_name: configs/models/Qwen2.5-1.5B-Instruct
  freeze_clip: true
  freeze_llm: true
  prompt_max_length: 96
  adapter_hidden_dim: 256

optimizer:
  name: adamw
  generator_lr: 0.00005
  router_lr: 0.00001
  weight_decay: 0.0001
  betas: [0.9, 0.999]

scheduler:
  generator_milestones: [25, 50, 75, 100]
  generator_gamma: 0.5
  router_milestones: [25, 50, 75, 100]
  router_gamma: 0.3

training:
  epochs: 400
  route_start_epoch: 0
  checkpoint_interval: 20
  validate_on: val
  pretrained_checkpoint: null
  strict_load: false
  lambda_style: 5.0
  lambda_route: 1.0
  lambda_foreground: 0.2
  lambda_background: 0.05

evaluation:
  checkpoint: artifacts/clipuie_uieb_sam_clip_llm/checkpoints/runs/20260421-205953/best.pth
  save_images: false
  compute_uiqm: true
  compute_uciqe: true
  compute_branch_metrics: false

runtime:
  device: cuda
  cudnn_benchmark: true
