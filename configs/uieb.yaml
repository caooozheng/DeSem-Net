experiment:
  name: uieb
  seed: 42
  output_dir: artifacts

dataset:
  train_root: UnderwaterDatasets/UIEB/train
  val_root: UnderwaterDatasets/UIEB/val
  test_root: UnderwaterDatasets/UIEB/test
  image_size: 256
  batch_size: 2
  num_workers: 4
  pin_memory: true
  mask_dir_name: mask_sam
  mask_suffix: .npy
  mask_fallback_value: 1.0

model:
  name: clipuie_net
  num_branch: 3
  n_feat: 32
  n_rcb: 2
  chan_factor: 2
  use_sam_mask: true
  use_dual_region_branch: true
  region_fusion_strength: 0.2
  multimodal_aux_strength: 0.02
  use_multimodal_initial_condition: false
  use_fg_bg_decoder: true
  fg_bg_decoder_strength: 0.05
  use_frequency_refinement: false
  frequency_refinement_strength: 0.0
  use_physical_head: false

multimodal:
  enabled: true
  clip_model_name: configs/models/clip-vit-base-patch32
  llm_model_name: configs/models/Qwen2.5-1.5B-Instruct
  freeze_clip: true
  freeze_llm: true
  prompt_max_length: 96
  adapter_hidden_dim: 256

optimizer:
  name: adamw
  generator_lr: 0.00005
  router_lr: 0.00001
  weight_decay: 0.0001
  betas: [0.9, 0.999]

scheduler:
  generator_milestones: [40, 80, 140, 180]
  generator_gamma: 0.5
  router_milestones: [40, 80, 140, 180]
  router_gamma: 0.3

training:
  epochs: 200
  route_start_epoch: 0
  checkpoint_interval: 20
  validate_on: val
  pretrained_checkpoint: null
  resume_checkpoint: artifacts/clipuie_final/checkpoints/runs/20260505-173828/latest.pth
  strict_load: false
  lambda_style: 5.0
  lambda_route: 1.0
  lambda_foreground: 0.2
  lambda_background: 0.05
  lambda_physical: 0.0
  lambda_lab: 0.0
  lambda_histogram: 0.0
  lambda_boundary: 0.0
  lambda_foreground_texture: 0.0
  route_score_psnr_weight: 0.9
  route_score_ssim_weight: 0.1
  route_score_color_weight: 0.0

evaluation:
  checkpoint: artifacts/clipuie_final/checkpoints/runs/20260505-173828/best.pth
  save_images: true
  hard_route: true
  output_branch_index: 1
  compute_uiqm: true
  compute_uciqe: true
  compute_branch_metrics: false

runtime:
  device: cuda
  cudnn_benchmark: true
