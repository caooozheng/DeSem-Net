experiment:
  name: ablation_uieb_05_full_rd
  seed: 42
  output_dir: artifacts/ablations

dataset:
  train_root: UnderwaterDatasets/UIEB/train
  val_root: UnderwaterDatasets/UIEB/val
  test_root: UnderwaterDatasets/UIEB/test
  image_size: 256
  batch_size: 2
  num_workers: 4
  pin_memory: true
  mask_dir_name: mask_sam
  mask_suffix: .npy
  mask_fallback_value: 1.0

model:
  name: clipuie_net
  num_branch: 3
  n_feat: 32
  n_rcb: 2
  chan_factor: 2
  use_sam_mask: true
  use_dual_region_branch: true
  region_fusion_strength: 0.2
  use_rsdc: false
  rsdc_strength: 0.0
  multimodal_aux_strength: 0.02
  use_multimodal_initial_condition: false
  use_fg_bg_decoder: true
  fg_bg_decoder_strength: 0.05
  use_frequency_refinement: false
  frequency_refinement_strength: 0.0
  use_wavelet_refinement: false
  wavelet_refinement_strength: 0.0
  use_transformer_context: false
  transformer_context_strength: 0.0
  use_white_balance_correction: false
  white_balance_strength: 0.0
  use_residual_output: false
  residual_output_strength: 0.0
  use_output_refinement: false
  output_refinement_strength: 0.0
  use_physical_head: false

multimodal:
  enabled: true
  clip_model_name: configs/models/clip-vit-base-patch32
  llm_model_name: configs/models/Qwen2.5-1.5B-Instruct
  freeze_clip: true
  freeze_llm: true
  prompt_max_length: 96
  adapter_hidden_dim: 256

optimizer:
  name: adamw
  generator_lr: 0.00001
  router_lr: 0.000002
  weight_decay: 0.00005
  betas: [0.9, 0.999]

scheduler:
  generator_milestones: [60, 120]
  generator_gamma: 0.5
  router_milestones: [60, 120]
  router_gamma: 0.3

training:
  epochs: 200
  route_start_epoch: 0
  checkpoint_interval: 0
  validate_on: val
  pretrained_checkpoint: null
  resume_checkpoint: null
  strict_load: false
  trainable_keywords: []
  use_ema: false
  ema_decay: 0.999
  lambda_recon: 0.0
  lambda_style: 2.0
  lambda_route: 0.05
  lambda_foreground: 0.02
  lambda_background: 0.005
  lambda_physical: 0.0
  lambda_lab: 0.0
  lambda_histogram: 0.0
  lambda_boundary: 0.0
  lambda_foreground_texture: 0.0
  lambda_branch_supervision: 0.05
  lambda_psnr_mse: 0.8
  lambda_ssim_loss: 0.08
  lambda_color_mse: 0.05
  loss_l1_weight: 0.5
  loss_l2_weight: 0.5
  loss_perceptual_weight: 0.05
  loss_gradient_weight: 0.04
  route_score_psnr_weight: 1.0
  route_score_ssim_weight: 0.0
  route_score_color_weight: 0.0
  phase_schedule:
    - name: psnr_polish
      start_epoch: 60
      generator_lr: 0.000003
      router_lr: 0.0000006
      lambda_style: 0.8
      lambda_route: 0.03
      lambda_foreground: 0.0
      lambda_background: 0.0
      lambda_branch_supervision: 0.03
      lambda_psnr_mse: 1.0
      lambda_ssim_loss: 0.04
      lambda_color_mse: 0.1
      loss_l1_weight: 0.35
      loss_l2_weight: 0.65
      loss_perceptual_weight: 0.0
      loss_gradient_weight: 0.02
    - name: low_lr_hold
      start_epoch: 120
      generator_lr: 0.000001
      router_lr: 0.0000002
      lambda_style: 0.5
      lambda_route: 0.02
      lambda_foreground: 0.0
      lambda_background: 0.0
      lambda_branch_supervision: 0.02
      lambda_psnr_mse: 1.0
      lambda_ssim_loss: 0.03
      lambda_color_mse: 0.08
      loss_l1_weight: 0.35
      loss_l2_weight: 0.65
      loss_perceptual_weight: 0.0
      loss_gradient_weight: 0.005

evaluation:
  checkpoint: null
  calibration_path: null
  save_images: false
  hard_route: true
  output_branch_index: 1
  self_ensemble: true
  compute_uiqm: true
  compute_uciqe: true
  compute_branch_metrics: false

runtime:
  device: cuda
  cudnn_benchmark: true
