experiment:
  name: euvp_dark
  seed: 42
  output_dir: artifacts

dataset:
  train_root: UnderwaterDatasets/EUVP-Dark/train
  val_root: UnderwaterDatasets/EUVP-Dark/val
  test_root: UnderwaterDatasets/EUVP-Dark/test
  image_size: 256
  batch_size: 2
  num_workers: 4
  pin_memory: true
  mask_dir_name: mask_sam
  mask_suffix: .npy
  mask_fallback_value: 1.0

model:
  name: clipuie_net
  num_branch: 3
  n_feat: 40
  n_rcb: 2
  chan_factor: 2
  use_sam_mask: true
  use_dual_region_branch: true
  region_fusion_strength: 0.2
  use_rsdc: true
  rsdc_strength: 0.05
  multimodal_aux_strength: 0.02
  use_multimodal_initial_condition: false
  use_fg_bg_decoder: true
  fg_bg_decoder_strength: 0.05
  use_frequency_refinement: false
  frequency_refinement_strength: 0.0
  use_wavelet_refinement: false
  wavelet_refinement_strength: 0.0
  use_transformer_context: false
  transformer_context_strength: 0.0
  use_white_balance_correction: true
  white_balance_strength: 0.08
  use_residual_output: true
  residual_output_strength: 0.8
  use_output_refinement: true
  output_refinement_strength: 0.2
  use_physical_head: false

multimodal:
  enabled: true
  clip_model_name: configs/models/clip-vit-base-patch32
  llm_model_name: configs/models/Qwen2.5-1.5B-Instruct
  freeze_clip: true
  freeze_llm: true
  prompt_max_length: 96
  adapter_hidden_dim: 256

optimizer:
  name: adamw
  generator_lr: 0.000003
  router_lr: 0.0000005
  weight_decay: 0.00001
  betas: [0.9, 0.999]

scheduler:
  generator_milestones: [20, 40, 60]
  generator_gamma: 0.5
  router_milestones: [20, 40, 60]
  router_gamma: 0.5

training:
  epochs: 180
  route_start_epoch: 0
  checkpoint_interval: 0
  validate_on: val
  pretrained_checkpoint: null
  resume_checkpoint: null
  strict_load: false
  trainable_keywords: []
  use_ema: false
  ema_decay: 0.999
  lambda_recon: 0.0
  lambda_style: 0.0
  lambda_route: 0.02
  lambda_foreground: 0.0
  lambda_background: 0.0
  lambda_physical: 0.0
  lambda_lab: 0.0
  lambda_histogram: 0.0
  lambda_boundary: 0.0
  lambda_foreground_texture: 0.0
  lambda_branch_supervision: 0.1
  lambda_psnr_mse: 2.0
  lambda_ssim_loss: 0.05
  lambda_color_mse: 0.5
  loss_l1_weight: 0.2
  loss_l2_weight: 1.0
  loss_perceptual_weight: 0.0
  loss_gradient_weight: 0.02
  route_score_psnr_weight: 1.0
  route_score_ssim_weight: 0.0
  route_score_color_weight: 0.0

evaluation:
#  checkpoint: artifacts/clipuie_euvp_scene_psnr30_fullfinetune/checkpoints/runs/20260523-173656/latest.pth
  checkpoint: weight/euvp-dark/latest.pth
  calibration_path: null
  save_images: false
  hard_route: false
  output_branch_index: 1
  self_ensemble: false
  compute_uiqm: true
  compute_uciqe: true
  compute_branch_metrics: false

runtime:
  device: cuda
  cudnn_benchmark: true
